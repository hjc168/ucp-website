<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Wah Tat Plant Admin</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="admin-layout">

<!-- Sidebar -->
<aside class="sidebar">
    <div class="sidebar__brand">
        <i class="fas fa-leaf" style="color:var(--admin-accent);font-size:20px;"></i>
        <span style="color:#fff;font-weight:700;margin-left:8px;">Wah Tat Admin</span>
    </div>
    <nav class="sidebar__nav">
        <a href="dashboard.html" class="active"><i class="fas fa-th-large"></i> <span data-en="Dashboard" data-zh="仪表盘">Dashboard</span></a>

        <div class="sidebar__section" data-en="Modules" data-zh="模块">Modules</div>
        <a href="module-home.html"><i class="fas fa-home"></i> <span data-en="Home" data-zh="首页">Home</span></a>
        <a href="module-products.html"><i class="fas fa-box"></i> <span data-en="Products" data-zh="产品">Products</span></a>
        <a href="module-sustainability.html"><i class="fas fa-leaf"></i> <span data-en="Sustainability" data-zh="可持续发展">Sustainability</span></a>
        <a href="module-contact.html"><i class="fas fa-envelope"></i> <span data-en="Contact Us" data-zh="联系我们">Contact Us</span></a>
        <a href="module-about.html"><i class="fas fa-info-circle"></i> <span data-en="About Us" data-zh="关于我们">About Us</span></a>

        <div class="sidebar__section" data-en="Media" data-zh="媒体">Media</div>
        <a href="images.html"><i class="fas fa-images"></i> <span data-en="Image Library" data-zh="图片库">Image Library</span></a>
    </nav>
    <div class="sidebar__footer">
        <a href="#" onclick="logout();return false" style="color:rgba(255,255,255,0.5);">
            <i class="fas fa-sign-out-alt"></i> <span data-en="Logout" data-zh="退出登录">Logout</span>
        </a>
    </div>
</aside>

<!-- Main -->
<main class="main-content">
    <div class="topbar">
        <h2 data-en="Dashboard" data-zh="仪表盘">Dashboard</h2>
        <div class="topbar__user">
            <button class="lang-toggle" onclick="toggleLang()" title="Switch to Chinese">
                <i class="fas fa-globe"></i> EN
            </button>
            <span data-en="Logged in as" data-zh="已登录">Logged in as</span> <strong id="usernameDisplay">...</strong>
        </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-card__number">...</div><div class="stat-card__label">Loading...</div></div>
    </div>

    <!-- Quick Links -->
    <div class="card">
        <div class="card__header"><h3><i class="fas fa-folder"></i> <span data-en="Content Modules" data-zh="内容模块">Content Modules</span></h3></div>
        <div class="quick-links">
            <a href="module-home.html" class="quick-link">
                <div class="quick-link__icon"><i class="fas fa-home"></i></div>
                <div class="quick-link__text" data-en="Home Page" data-zh="首页">Home Page</div>
            </a>
            <a href="module-products.html" class="quick-link">
                <div class="quick-link__icon"><i class="fas fa-box"></i></div>
                <div class="quick-link__text" data-en="Products" data-zh="产品">Products</div>
            </a>
            <a href="module-sustainability.html" class="quick-link">
                <div class="quick-link__icon"><i class="fas fa-leaf"></i></div>
                <div class="quick-link__text" data-en="Sustainability" data-zh="可持续发展">Sustainability</div>
            </a>
            <a href="module-contact.html" class="quick-link">
                <div class="quick-link__icon"><i class="fas fa-envelope"></i></div>
                <div class="quick-link__text" data-en="Contact Us" data-zh="联系我们">Contact Us</div>
            </a>
            <a href="module-about.html" class="quick-link">
                <div class="quick-link__icon"><i class="fas fa-info-circle"></i></div>
                <div class="quick-link__text" data-en="About Us" data-zh="关于我们">About Us</div>
            </a>
        </div>
    </div>

    <!-- Recent Uploads -->
    <div class="card">
        <div class="card__header">
            <h3><i class="fas fa-clock"></i> <span data-en="Recent Uploads" data-zh="最近上传">Recent Uploads</span></h3>
            <a href="images.html" class="btn btn-outline btn-sm">View All</a>
        </div>
        <div id="recentUploads" style="font-size:14px;color:var(--admin-text-light);">Loading...</div>
    </div>
</main>

<div class="toast" id="toast"></div>

<script src="js/admin.js"></script>
<script>
(async () => {
    if (!await checkAuth()) return;

    // Load stats
    try {
        const stats = await apiGet('/api/stats');
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card">
                <div class="stat-card__number">${stats.totalImages}</div>
                <div class="stat-card__label">Total Images</div>
            </div>
            ${Object.entries(stats.imagesByModule).map(([mod, count]) => `
            <div class="stat-card">
                <div class="stat-card__number">${count}</div>
                <div class="stat-card__label">${mod.charAt(0).toUpperCase() + mod.slice(1)} Images</div>
            </div>`).join('')}
            <div class="stat-card">
                <div class="stat-card__number">${stats.modules.length}</div>
                <div class="stat-card__label">Modules</div>
            </div>
        `;

        // Recent uploads
        const recent = stats.recentUploads;
        document.getElementById('recentUploads').innerHTML = recent.length
            ? recent.map(i => `
                <div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--admin-border);">
                    <img src="../${i.path}" style="width:40px;height:40px;object-fit:cover;border-radius:4px;" onerror="this.style.display='none'">
                    <div>
                        <div style="font-weight:600;font-size:13px;">${i.originalName}</div>
                        <div style="font-size:11px;color:var(--admin-text-light);">${formatSize(i.size)} · ${formatDate(i.uploadedAt)}</div>
                    </div>
                    <span class="badge badge--${i.module}">${i.module}</span>
                </div>`).join('')
            : '<p>No images uploaded yet. <a href="images.html">Upload your first image</a>.</p>';
    } catch (e) {
        console.error(e);
    }
})();
function toggleLang() { applyLang(currentLang === 'en' ? 'zh' : 'en'); }
</script>

</body>
</html>
