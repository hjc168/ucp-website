<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Library — Wah Tat Plant Admin</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="admin-layout">

<aside class="sidebar">
    <div class="sidebar__brand">
        <i class="fas fa-leaf" style="color:var(--admin-accent);font-size:20px;"></i>
        <span style="color:#fff;font-weight:700;margin-left:8px;">Wah Tat Admin</span>
    </div>
    <nav class="sidebar__nav">
        <a href="dashboard.html"><i class="fas fa-th-large"></i> <span>Dashboard</span></a>
        <div class="sidebar__section">Modules</div>
        <a href="module-home.html"><i class="fas fa-home"></i> <span>Home</span></a>
        <a href="module-products.html"><i class="fas fa-box"></i> <span>Products</span></a>
        <a href="module-sustainability.html"><i class="fas fa-leaf"></i> <span>Sustainability</span></a>
        <a href="module-contact.html"><i class="fas fa-envelope"></i> <span>Contact Us</span></a>
        <a href="module-about.html"><i class="fas fa-info-circle"></i> <span>About Us</span></a>
        <div class="sidebar__section">Media</div>
        <a href="images.html" class="active"><i class="fas fa-images"></i> <span>Image Library</span></a>
    </nav>
    <div class="sidebar__footer">
        <a href="#" onclick="logout();return false" style="color:rgba(255,255,255,0.5);">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </div>
</aside>

<main class="main-content">
    <div class="topbar">
        <h2>Image Library</h2>
        <div class="topbar__user"><span>Hi,</span> <strong id="usernameDisplay">...</strong></div>
    </div>

    <!-- Upload Zone -->
    <div class="card">
        <div class="card__header"><h3><i class="fas fa-upload"></i> Upload Images</h3></div>
        <div class="upload-zone" id="uploadZone">
            <i class="fas fa-cloud-upload-alt"></i>
            <p>Drag & drop images here, or click to browse</p>
            <p style="font-size:11px;margin-top:4px;">JPG, PNG, GIF, WebP, SVG — Max 10 MB each</p>
            <input type="file" id="fileInput" multiple accept="image/*">
        </div>
        <div style="margin-top:12px;display:flex;gap:12px;align-items:center;">
            <label for="uploadModule" style="font-size:13px;font-weight:600;">Target Module:</label>
            <select id="uploadModule">
                <option value="products">Products</option>
                <option value="sustainability">Sustainability</option>
                <option value="home">Home</option>
                <option value="contact">Contact</option>
                <option value="about">About</option>
            </select>
            <span id="uploadStatus" style="font-size:13px;color:var(--admin-text-light);"></span>
        </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
        <select id="filterModule" onchange="loadImages()">
            <option value="">All Modules</option>
            <option value="products">Products</option>
            <option value="sustainability">Sustainability</option>
            <option value="home">Home</option>
            <option value="contact">Contact</option>
            <option value="about">About</option>
        </select>
        <span id="imageCount" style="font-size:13px;color:var(--admin-text-light);"></span>
    </div>

    <!-- Image Grid -->
    <div class="image-grid" id="imageGrid">
        <p style="grid-column:1/-1;color:var(--admin-text-light);padding:40px;text-align:center;">Loading images...</p>
    </div>
</main>

<!-- Mount Modal -->
<div class="modal-overlay" id="mountModalOverlay">
    <div class="modal" id="mountModal">
        <h3 id="mountModalTitle">Mount Image to Page</h3>
        <img id="mountPreview" src="" alt="" style="max-height:200px;margin:0 auto;display:block;">
        <div class="form-group">
            <label>Target Page</label>
            <select id="mountFile">
                <option value="index.html">Home (index.html)</option>
                <option value="products/index.html">Products (products/index.html)</option>
                <option value="products/floral-plants.html">Floral Plants</option>
                <option value="products/home-decor.html">Home Decor</option>
                <option value="products/seasonal-festive.html">Seasonal Festive</option>
                <option value="sustainability/index.html">Sustainability</option>
                <option value="sustainability/climate-change.html">Climate Change</option>
                <option value="sustainability/sustainable-materials.html">Sustainable Materials</option>
                <option value="sustainability/green-manufacturing.html">Green Manufacturing</option>
                <option value="contact/index.html">Contact Us</option>
                <option value="about/index.html">About Us</option>
            </select>
        </div>
        <div class="form-group">
            <label>CSS Selector (target element)</label>
            <input type="text" id="mountSelector" placeholder="e.g. .gallery-item:nth-child(1) img">
        </div>
        <div class="modal__actions">
            <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" onclick="mountImage()"><i class="fas fa-paperclip"></i> Mount Image</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/admin.js"></script>
<script>
let currentImages = [];
let mountImageId = null;

(async () => {
    if (!await checkAuth()) return;
    loadImages();
})();

async function loadImages() {
    const mod = document.getElementById('filterModule').value;
    const grid = document.getElementById('imageGrid');
    grid.innerHTML = '<p style="grid-column:1/-1;color:var(--admin-text-light);padding:40px;text-align:center;">Loading...</p>';

    try {
        const images = await apiGet('/api/images' + (mod ? `?module=${mod}` : ''));
        currentImages = images || [];
        document.getElementById('imageCount').textContent = `${currentImages.length} image(s)`;

        if (currentImages.length === 0) {
            grid.innerHTML = '<p style="grid-column:1/-1;color:var(--admin-text-light);padding:40px;text-align:center;">No images yet. Upload your first image above.</p>';
            return;
        }

        grid.innerHTML = currentImages.map(img => `
            <div class="image-card">
                <img class="image-card__preview" src="../${img.path}" alt="${img.originalName}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22><rect fill=%22%23ddd%22 width=%22200%22 height=%22200%22/><text x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 fill=%22%23999%22 font-size=%2214%22>No Preview</text></svg>'">
                <div class="image-card__info">
                    <div class="image-card__name" title="${img.originalName}">${img.originalName}</div>
                    <div class="image-card__meta">${formatSize(img.size)}</div>
                </div>
                <div style="padding:0 12px 4px;">
                    <span class="badge badge--${img.module}">${img.module}</span>
                </div>
                <div class="image-card__actions">
                    <button class="btn btn-primary btn-sm" onclick="openMountModal('${img.id}')" title="Mount to page">
                        <i class="fas fa-paperclip"></i> Mount
                    </button>
                    <button class="btn btn-danger btn-sm" onclick="deleteImage('${img.id}')" title="Delete">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>
        `).join('');
    } catch (e) {
        grid.innerHTML = '<p style="grid-column:1/-1;color:var(--admin-danger);padding:40px;text-align:center;">Failed to load images.</p>';
    }
}

// ── Upload ──────────────────────────────────────────
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');

uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', (e) => { e.preventDefault(); uploadZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

async function handleFiles(files) {
    if (!files.length) return;
    const mod = document.getElementById('uploadModule').value;
    const status = document.getElementById('uploadStatus');
    status.textContent = `Uploading ${files.length} file(s)...`;

    const formData = new FormData();
    formData.append('module', mod);
    for (const file of files) formData.append('images', file);

    try {
        const res = await fetch('/api/images/upload', { method: 'POST', body: formData });
        if (res.status === 401) { window.location.href = '/admin/'; return; }
        const data = await res.json();
        status.textContent = data.success ? `Uploaded ${data.images.length} image(s)!` : 'Upload failed.';
        showToast(`Uploaded ${data.images.length} image(s) to ${mod}`, 'success');
        fileInput.value = '';
        loadImages();
    } catch (e) {
        status.textContent = 'Upload error.';
    }
}

// ── Delete ──────────────────────────────────────────
async function deleteImage(id) {
    if (!confirm('Delete this image? This cannot be undone.')) return;
    try {
        await apiDelete(`/api/images/${id}`);
        showToast('Image deleted', 'success');
        loadImages();
    } catch (e) {
        showToast('Delete failed', 'error');
    }
}

// ── Mount Modal ─────────────────────────────────────
function openMountModal(imageId) {
    mountImageId = imageId;
    const img = currentImages.find(i => i.id === imageId);
    if (!img) return;
    document.getElementById('mountModalTitle').textContent = `Mount: ${img.originalName}`;
    document.getElementById('mountPreview').src = `../${img.path}`;
    document.getElementById('mountModalOverlay').classList.add('active');
}
function closeModal() {
    document.getElementById('mountModalOverlay').classList.remove('active');
    mountImageId = null;
}
document.getElementById('mountModalOverlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('mountModalOverlay')) closeModal();
});

async function mountImage() {
    if (!mountImageId) return;
    const filePath = document.getElementById('mountFile').value;
    const selector = document.getElementById('mountSelector').value.trim();

    if (!selector) { showToast('Please enter a CSS selector', 'error'); return; }

    try {
        const result = await apiPost('/api/mount-image', { imageId: mountImageId, filePath, selector, attribute: 'src' });
        if (result.success) {
            showToast(`Image mounted to ${filePath}`, 'success');
            closeModal();
        } else {
            showToast(result.error || 'Mount failed', 'error');
        }
    } catch (e) {
        showToast('Mount failed', 'error');
    }
}
</script>

</body>
</html>
