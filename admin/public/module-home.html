<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page &mdash; Wah Tat Plant Admin</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="admin-layout">

<aside class="sidebar">
    <div class="sidebar__brand"><i class="fas fa-leaf" style="color:var(--admin-accent);font-size:20px;"></i> <span style="color:#fff;font-weight:700;margin-left:8px;">Wah Tat Admin</span></div>
    <nav class="sidebar__nav">
        <a href="dashboard.html"><i class="fas fa-th-large"></i> <span data-en="Dashboard" data-zh="仪表盘">Dashboard</span></a>
        <div class="sidebar__section" data-en="Modules" data-zh="模块">Modules</div>
        <a href="module-home.html" class="active"><i class="fas fa-home"></i> <span data-en="Home" data-zh="首页">Home</span></a>
        <a href="module-products.html"><i class="fas fa-box"></i> <span data-en="Products" data-zh="产品">Products</span></a>
        <a href="module-sustainability.html"><i class="fas fa-leaf"></i> <span data-en="Sustainability" data-zh="可持续发展">Sustainability</span></a>
        <a href="module-contact.html"><i class="fas fa-envelope"></i> <span data-en="Contact Us" data-zh="联系我们">Contact Us</span></a>
        <a href="module-about.html"><i class="fas fa-info-circle"></i> <span data-en="About Us" data-zh="关于我们">About Us</span></a>
        <div class="sidebar__section" data-en="Media" data-zh="媒体">Media</div>
        <a href="images.html"><i class="fas fa-images"></i> <span data-en="Image Library" data-zh="图片库">Image Library</span></a>
    </nav>
    <div class="sidebar__footer"><a href="#" onclick="logout();return false" style="color:rgba(255,255,255,0.5);"><i class="fas fa-sign-out-alt"></i> <span data-en="Logout" data-zh="退出登录">Logout</span></a></div>
</aside>

<main class="main-content">
    <div class="topbar">
        <h2><i class="fas fa-home"></i> <span data-en="Home Page" data-zh="首页">Home Page</span></h2>
        <div class="topbar__user">
            <button class="lang-toggle" onclick="toggleLang()" title="Switch to Chinese"><i class="fas fa-globe"></i> EN</button>
            <span data-en="Hi," data-zh="你好，">Hi,</span> <strong id="usernameDisplay">...</strong>
        </div>
    </div>


    <div class="card">
        <div class="card__header">
            <h3 data-en="Images on This Page" data-zh="当前页面图片"><i class="fas fa-images"></i> Images on This Page</h3>
            <button class="btn btn-outline btn-sm" onclick="scanPageImages()"><i class="fas fa-sync-alt"></i> <span data-en="Scan" data-zh="扫描">Scan</span></button>
        </div>
        <div class="image-grid" id="pageImagesGrid">
            <p style="grid-column:1/-1;color:var(--admin-text-light);padding:20px;text-align:center;font-size:14px;">Click <strong>Scan</strong> to detect images on this page.</p>
        </div>
    </div>

    <div class="card">
        <div class="card__header">
            <h3 data-en="Editable Content" data-zh="可编辑内容">Editable Content</h3>
            <button class="btn btn-primary btn-sm" onclick="saveAll()"><i class="fas fa-save"></i> <span data-en="Save All" data-zh="全部保存">Save All</span></button>
        </div>
        <div class="content-form" id="contentForm">
            <p style="color:var(--admin-text-light);padding:20px;text-align:center;">Loading content...</p>
        </div>
    </div>
</main>

<div class="modal-overlay" id="pickerModalOverlay">
    <div class="modal" style="max-width:800px;">
        <h3 data-en="Select Image from Library" data-zh="从图片库选择">Select Image from Library</h3>
        <div class="filter-bar" style="margin-bottom:16px;">
        </div>
        <div class="image-grid" id="pickerImageGrid" style="max-height:400px;overflow-y:auto;">
            <p style="grid-column:1/-1;color:var(--admin-text-light);padding:20px;text-align:center;">Loading...</p>
        </div>
        <div class="modal__actions">
            <button class="btn btn-outline" onclick="closePickerModal()">Cancel</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/admin.js"></script>
<script src="js/module-images.js"></script>
<script>
var MODULE = 'home';
var currentPage = 'index';

(async function() {
    if (!await checkAuth()) return;
    loadContent();
})();

function onPageChange() {
    currentPage = document.getElementById('pageSelector').value;
    loadContent();
    var grid = document.getElementById('pageImagesGrid');
    if (grid) grid.innerHTML = '<p style="grid-column:1/-1;color:var(--admin-text-light);padding:20px;text-align:center;font-size:14px;">Click <strong>Scan</strong> to detect images on this page.</p>';
}

async function loadContent() {
    var form = document.getElementById('contentForm');
    form.innerHTML = '<p style="color:var(--admin-text-light);padding:20px;text-align:center;">Loading...</p>';
    try {
        var data = await apiGet('/api/content/' + MODULE + '?page=' + currentPage);
        if (!data || !data.items || data.items.length === 0) {
            form.innerHTML = '<p style="color:var(--admin-text-light);padding:20px;text-align:center;">No editable content found for this page.</p>';
            return;
        }
        var html = '';
        for (var i = 0; i < data.items.length; i++) {
            var item = data.items[i];
            html += '<div class="content-item" data-key="' + item.key + '">';
            html += '<div class="content-item__label">' + item.label + '</div>';
            html += '<div class="content-item__meta">' + item.file + ' &rarr; ' + item.selector + '</div>';
            html += '<div class="lang-row">';
            html += '<div><label>English (EN)</label>';
            html += '<textarea class="lang-en">' + escapeHtml(item.en) + '</textarea></div>';
            html += '<div><label>中文 (ZH)</label>';
            html += '<textarea class="lang-zh">' + escapeHtml(item.zh) + '</textarea></div>';
            html += '</div></div>';
        }
        form.innerHTML = html;
    } catch (e) {
        form.innerHTML = '<p style="color:var(--admin-danger);padding:20px;text-align:center;">Failed to load content.</p>';
    }
}

async function saveAll() {
    var items = document.querySelectorAll('.content-item');
    var saved = 0, failed = 0;
    for (var i = 0; i < items.length; i++) {
        var item = items[i];
        try {
            var result = await apiPut('/api/content/' + MODULE, {
                key: item.dataset.key,
                en: item.querySelector('.lang-en').value,
                zh: item.querySelector('.lang-zh').value
            });
            if (result.success) saved++; else failed++;
        } catch (e) { failed++; }
    }
    showToast(currentLang === 'zh' ? '已保存 ' + saved + ' 项！' : saved + ' item(s) saved!', failed ? 'error' : 'success');
}

function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text || '';
    return div.innerHTML;
}
function toggleLang() { applyLang(currentLang === 'en' ? 'zh' : 'en'); }
</script>

</body>
</html>
